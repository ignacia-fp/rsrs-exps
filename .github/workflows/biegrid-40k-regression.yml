name: BIEGrid 40k Regression

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  biegrid-40k:
    name: Seeded 40k BIEGrid regression
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Run seeded 40k BIEGrid regression
        run: docker compose run --rm dev python scripts/check_biegrid_40k_regression.py
